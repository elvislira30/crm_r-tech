<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SISTEMA R-TECH</title><script src="https://unpkg.com/@phosphor-icons/web"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* PALETA DE AZUL AJUSTADA PARA MÁXIMA VISIBILIDADE */
:root{
    --p:#1976d2;    /* Primário: Azul Royal Profissional (Botões, Active) */
    --pl:#f0f7ff;   /* Primário Light: Azul Pastel Muito Claro (Fundo Focus, Badges) */
    --s:#0d47a1;    /* Secundário: Azul Marinho Muito Escuro (Títulos, Cabeçalhos) */
    --a:#29b6f6;    /* Accent: Azul Sky Brilhante (Accent Secundário, Mapas) */
    --bg:#f5f8fa;   /* Body Background (Tom de azul-grey quase branco) */
    --c:#fff;       /* Card White */
    --t:#1a1c1d;    /* Main Text (Quase preto para máxima leitura) */
    --m:#606f7b;    /* Muted Text (Grey Escuro) */
    --b:#dae1e7;    /* Borders */
    --r:12px
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden}
.sb{width:240px;background:var(--c);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:20px 0;transition:.3s}
.sb h2{color:var(--p);font-size:18px;display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid var(--b);margin-bottom:20px}
.nav{flex:1;display:flex;flex-direction:column;gap:5px;padding:0 15px}
.ni{display:flex;align-items:center;gap:12px;padding:12px 15px;color:var(--m);border-radius:8px;font-weight:600;cursor:pointer;transition:.2s}
.ni:hover{background:var(--pl);color:var(--p)}
.ni.act{background:var(--p);color:#fff}
main{flex:1;overflow-y:auto;padding:30px}
.vw{display:none;animation:fi .4s ease}
.vw.act{display:block}@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.hdr h1{font-size:24px;color:var(--s)} /* Títulos em Azul Escuro */
.t-bdg{background:var(--pl);color:var(--p);padding:8px 16px;border-radius:20px;font-weight:700;font-size:14px;border:1px solid var(--p)}
.crd{background:var(--c);border-radius:var(--r);padding:25px;box-shadow:0 4px 20px rgba(0,0,0,.05);border:1px solid var(--b);margin-bottom:20px}
.fr{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}
.fg{flex:1;min-width:200px;display:flex;flex-direction:column}
label{font-size:12px;font-weight:700;color:var(--m);margin-bottom:6px;text-transform:uppercase}
input,select,textarea{width:100%;padding:12px 15px;border:1px solid var(--b);border-radius:8px;font-size:14px;background:#fff;color:var(--t);transition:.3s;outline:0}
input:focus,select:focus,textarea:focus{border-color:var(--p);background:var(--pl);box-shadow:0 0 0 3px rgba(25, 118, 210, 0.1)}
.ig{display:flex;gap:8px}
.btn{padding:12px 20px;border:0;border-radius:8px;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap}
.bp{background:var(--p);color:#fff} /* Botão Principal Azul */
.bp:hover{background:#1565c0;transform:translateY(-2px)}
.ba{background:var(--s);color:#fff} /* Botão Secundário Navy */
.ba:hover{background:#0a3b85;transform:translateY(-2px)}
.bo{background:0 0;border:1px solid var(--b);color:var(--t)}
.bo:hover{background:#f1f2f6}
.bi{background:var(--pl);color:var(--p);border:1px solid var(--p);border-radius:8px;cursor:pointer;width:45px;display:flex;align-items:center;justify-content:center}
.bi:hover{background:var(--p);color:#fff}
.ag{display:flex;gap:10px;margin-top:20px}
.sbar{display:flex;gap:10px;margin-bottom:20px;background:var(--pl);padding:15px;border-radius:var(--r);border:1px solid var(--b)}
.osi{background:#fff;border:1px solid var(--b);border-radius:var(--r);padding:20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;gap:15px;transition:.2s;border-left:4px solid var(--stc,var(--p))}
.osi:hover{box-shadow:0 4px 20px rgba(0,0,0,.05);transform:translateY(-2px)}
.osi h4{color:var(--s);font-size:16px;display:flex;align-items:center;gap:6px}
.osi p{margin:4px 0;font-size:13px;color:var(--m)}
.bdg{padding:4px 10px;border-radius:20px;font-weight:700;font-size:11px;text-transform:uppercase;background:#f8f9fa;border:1px solid var(--b);color:var(--m)}
.bdg.and{background:#fff8e1;color:#f39c12;border-color:#ffeaa7}
.bdg.con{background:#e8f8f5;color:#2ecc71;border-color:#a3e4d7}
.osa{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.osv{font-size:18px;font-weight:800;color:var(--p)}
.cat{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid var(--b)}
.cG{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cDh{text-align:center;font-weight:700;font-size:11px;color:var(--m);padding:5px 0}
.cD{background:var(--c);border:1px solid var(--b);border-radius:6px;min-height:75px;padding:5px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:3px}
.cD:hover{border-color:var(--p);background:var(--pl)}
.cD.td{background:var(--pl);border-color:var(--p)}
.cD.sl{border-color:var(--a);box-shadow:0 0 0 2px var(--a) inset}
.cDn{font-weight:700;font-size:12px;color:var(--s);margin-bottom:3px}
.cE{font-size:9px;padding:3px 4px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.cE.ag{background:var(--pl);color:var(--p);border:1px solid #c4e1df} /* Agendado Azul */
.cE.an{background:#fff8e1;color:#f39c12;border:1px solid #ffeaa7} /* Em Andamento Laranja */
.cE.co{background:#e8f8f5;color:#2ecc71;border:1px solid #a3e4d7} /* Concluído Verde */
.kG{display:flex;gap:15px;margin-bottom:20px}
.kC{flex:1;background:var(--c);border:1px solid var(--b);border-radius:var(--r);padding:20px;border-left:4px solid var(--p)}
.kC h3{font-size:12px;color:var(--m);text-transform:uppercase;display:flex;align-items:center;gap:5px}
.kC p{font-size:22px;font-weight:800;color:var(--p);margin-top:5px}
@media(max-width:768px){body{flex-direction:column}.sb{width:100%;height:auto;flex-direction:row;align-items:center;justify-content:space-between;padding:10px}.sb h2{border:0;margin:0;padding:0}.nav{flex-direction:row;overflow-x:auto;padding:0}.ni{padding:8px 12px;white-space:nowrap}.ag,.osi,.kG{flex-direction:column;align-items:flex-start}.osa{width:100%;flex-direction:row;justify-content:space-between}}</style></head>
<body><aside class="sb"><h2><i class="ph-fill ph-crosshair"></i> R-TECH</h2><nav class="nav"><div class="ni act" onclick="sv('v-os',this)"><i class="ph ph-plus-circle"></i> Nova O.S</div><div class="ni" onclick="sv('v-hst',this)"><i class="ph ph-calendar"></i> Agenda O.S</div><div class="ni" onclick="sv('v-fin',this)"><i class="ph ph-currency-dollar"></i> Financeiro</div><div class="ni" onclick="sv('v-cli',this)"><i class="ph ph-users"></i> Clientes</div><div class="ni" onclick="sv('v-cat',this)"><i class="ph ph-wrench"></i> Catálogo</div></nav></aside>
<main>
<section id="v-os" class="vw act"><div class="hdr"><h1 id="fTit">Nova O.S</h1></div><div class="crd"><form id="fOs"><input type="hidden" id="eId"><div class="fr"><div class="fg" style="flex:2"><label>Cliente</label><input type="text" id="cli" list="lCli" required autocomplete="off" oninput="aF()"><datalist id="lCli"></datalist></div><div class="fg"><label>Veículo / Placa</label><input type="text" id="vei" style="text-transform:uppercase" required></div></div><div class="fr"><div class="fg"><label>Data</label><input type="date" id="dat" required></div><div class="fg"><label>Horário</label><input type="time" id="hor" required></div></div><div class="fr"><div class="fg" style="flex:2"><label>Endereço</label><input type="text" id="end" onblur="bGPS()" placeholder="Digite o endereço e clique fora para buscar o GPS..."></div><div class="fg"><label>GPS</label><div class="ig"><input type="text" id="gps" placeholder="-8.05,-34.88"><button type="button" class="bi" onclick="cGPS()" title="Meu Local"><i class="ph ph-crosshair"></i></button><button type="button" class="bi" onclick="oMap()" title="Ver no Mapa"><i class="ph ph-map-trifold"></i></button></div></div></div>
<div class="fr"><div class="fg" style="flex:2;background:var(--bg);padding:15px;border-radius:var(--r);border:1px dashed var(--b)"><label><i class="ph ph-lightning"></i> Catálogo Rápido</label><select id="sCat" onchange="aCat()"></select></div><div class="fg"><label><i class="ph ph-camera"></i> Evidência Fotográfica</label><input type="file" id="cam" accept="image/*" capture="environment" style="display:none"><button type="button" class="btn bo" onclick="$('cam').click()"><i class="ph ph-camera"></i> Tirar Foto</button><img id="fPrv" style="display:none;width:100%;border-radius:8px;margin-top:10px;border:1px solid var(--b)"></div></div>
<div class="fg" style="margin-bottom:15px"><label>Descrição Completa</label><textarea id="dsc" rows="4" required></textarea></div><div class="fr"><div class="fg"><label>Status O.S</label><select id="sts"><option>Agendado</option><option>Em Andamento</option><option>Concluído</option></select></div><div class="fg"><label>Pagamento</label><select id="pag"><option value="0">Pendente</option><option value="1">Pago</option></select></div><div class="fg"><label>Valor (R$)</label><input type="number" id="val" step="0.01" min="0" required></div></div><div class="ag"><button type="submit" id="bSal" class="btn bp" style="flex:2"><i class="ph ph-cloud-arrow-up"></i> SALVAR O.S</button><button type="button" onclick="gPOS()" class="btn ba" style="flex:1"><i class="ph ph-whatsapp-logo"></i> PRÉ-O.S</button></div><button type="button" id="bCan" class="btn bo" style="width:100%;margin-top:10px;display:none" onclick="cEd()">Cancelar Edição</button></form></div></section>
<section id="v-hst" class="vw"><div class="hdr"><h1>Agenda de O.S</h1><div style="display:flex;gap:10px;align-items:center"><button class="btn bo" style="padding:6px 12px;font-size:12px" onclick="sNuv()"><i class="ph ph-arrows-clockwise"></i> Sincronizar</button><div class="t-bdg" id="tFat">Fat: R$ 0,00</div></div></div><div class="crd" style="padding:15px"><div class="hdr" style="margin-bottom:15px;justify-content:center;gap:20px"><button class="btn bo" style="padding:5px 15px" onclick="cMes(-1)"><i class="ph ph-caret-left"></i></button><h3 id="calM" style="color:var(--s);font-size:16px;text-transform:uppercase;margin:0">Mês</h3><button class="btn bo" style="padding:5px 15px" onclick="cMes(1)"><i class="ph ph-caret-right"></i></button></div><div style="overflow-x:auto;padding-bottom:5px"><div id="cGrid" class="cG" style="min-width:650px"></div></div></div><div class="sbar"><div class="ig" style="flex:3"><button class="bi" style="border:0"><i class="ph ph-magnifying-glass"></i></button><input type="text" id="bTxt" placeholder="Buscar por cliente, placa ou id..." style="border:0;background:0 0"></div><input type="date" id="bDat" style="flex:1;display:none"><button class="btn bo" style="padding:10px" onclick="lFlt()" title="Mostrar Tudo"><i class="ph ph-x"></i> Tudo</button></div><div id="lOs"></div></section>
<section id="v-fin" class="vw"><div class="hdr"><h1>Gestão Financeira</h1></div><div class="kG"><div class="kC" style="border-left-color:#2ecc71"><h3 style="color:#2ecc71"><i class="ph ph-check-circle"></i> Recebido</h3><p id="tRec" style="color:#2ecc71">R$ 0,00</p></div><div class="kC" style="border-left-color:#f39c12"><h3 style="color:#f39c12"><i class="ph ph-clock"></i> A Receber</h3><p id="tPen" style="color:#f39c12">R$ 0,00</p></div><div class="kC"><h3><i class="ph ph-sigma"></i> Faturamento</h3><p id="tTot">R$ 0,00</p></div></div><div class="sbar"><div class="ig" style="width:100%"><i class="ph ph-calendar" style="font-size:20px;color:var(--p);margin:auto 10px"></i><input type="month" id="fMes" onchange="rFin()" style="border:0;background:0 0;flex:1"><button class="btn bo" style="padding:10px" onclick="$('fMes').value='';rFin()"><i class="ph ph-x"></i> Limpar Filtro</button></div></div><div id="lFin"></div></section>
<section id="v-cli" class="vw"><div class="hdr"><h1>Clientes</h1></div><div class="crd"><form id="fCli"><input type="hidden" id="cId"><div class="fr"><div class="fg" style="flex:2"><label>Nome</label><input type="text" id="cNom" required autocomplete="off"></div><div class="fg"><label>CNPJ/CPF</label><input type="text" id="cDoc" autocomplete="off"></div></div><div class="fr"><div class="fg"><label>Tel</label><input type="text" id="cTel" autocomplete="off"></div><div class="fg"><label>E-mail</label><input type="email" id="cEma" autocomplete="off"></div><div class="fg"><label>Contato</label><input type="text" id="cRes" autocomplete="off"></div></div><div class="fr"><div class="fg" style="flex:3"><label>Endereço</label><input type="text" id="cEnd" autocomplete="off"></div><div class="ig" style="align-items:flex-end;flex:1"><button type="submit" id="bCSal" class="btn bp" style="width:100%"><i class="ph ph-plus"></i> Salvar</button><button type="button" id="bCCan" class="btn bo" style="display:none" onclick="cCEd()"><i class="ph ph-x"></i></button></div></div></form></div><div class="sbar"><div class="ig" style="width:100%"><button class="bi" style="border:0"><i class="ph ph-magnifying-glass"></i></button><input type="text" id="bCliTxt" placeholder="Pesquisar..." style="border:0;background:0 0;flex:1"></div></div><div id="lCliRnd"></div></section>
<section id="v-cat" class="vw"><div class="hdr"><h1>Catálogo</h1></div><div class="crd"><form id="fCat" class="fr" style="align-items:flex-end"><div class="fg" style="flex:2"><label>Nome</label><input type="text" id="nCat" required></div><div class="fg"><label>Valor (R$)</label><input type="number" id="vCat" step="0.01" min="0" required></div><button type="submit" class="btn bp"><i class="ph ph-plus"></i></button></form><div id="rCat" style="margin-top:20px"></div><button class="btn bo" onclick="rCatP()" style="margin:25px auto 0"><i class="ph ph-arrows-counter-clockwise"></i> Padrão</button></div></section>
</main>
<script>
const $=i=>document.getElementById(i),$$=q=>document.querySelectorAll(q),v=i=>$(i).value,ls=localStorage,p=JSON.parse,s=JSON.stringify,tst=Swal.mixin({toast:!0,position:'top-end',showConfirmButton:!1,timer:3000,timerProgressBar:!0});
const sv=(id,e)=>{$$('.vw,.ni').forEach(x=>x.classList.remove('act'));$(id).classList.add('act');e.classList.add('act');if(id=='v-hst'){rL();rCal()};if(id=='v-fin')rFin();if(id=='v-cli')rCli()};
const fM=v=>Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}),fD=d=>d.split('-').reverse().join('/');
let dbC=p(ls.getItem('dbC'))||[];if(dbC[0]?.substr)dbC=dbC.map((n,i)=>({id:Date.now()+i,nome:n,tel:'',doc:'',ema:'',res:'',end:''})),ls.setItem('dbC',s(dbC));
let dbO=p(ls.getItem('dbO'))||[],cP=[{id:1,nome:"Instalação Rastreador",valor:150},{id:2,nome:"Manutenção Rastreador",valor:80},{id:3,nome:"Retirada",valor:100},{id:4,nome:"Relé",valor:60},{id:5,nome:"Teclado",valor:100},{id:6,nome:"DVR",valor:120}],dbCat=p(ls.getItem('dbCat'))||cP;

let imgB64 = '';
const CLOUD_URL = 'https://api.cloudinary.com/v1_1/dkkmhbcvh/image/upload', UP_PRESET = 'warbuqc6';

// -------- ATENÇÃO: COLE A SUA URL QUE TERMINA COM /exec AQUI! --------
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwfuCYP3lCgxEZx86pETrZPXXU8YnjFZ5BoB2PHJM9QEejwRtM56fX9FUX6dgikZWi/exec'; 
// ---------------------------------------------------------------------

window.onload=()=>{let d=new Date();cEd();aDl();rC();rL();rCal();rCli();$('fMes').value=d.toISOString().slice(0,7);rFin()};

$('cam').onchange = e => {
    let f = e.target.files[0]; if(!f) return;
    let r = new FileReader();
    r.onload = ev => {
        let i = new Image();
        i.onload = () => {
            let cv = document.createElement('canvas'), c = cv.getContext('2d');
            cv.width = i.width; cv.height = i.height; c.drawImage(i,0,0);
            c.font = `bold ${i.width/25}px sans-serif`; c.fillStyle = '#fff'; c.shadowColor = '#000'; c.shadowBlur = 10;
            c.fillText(`NOC | ${v('vei').toUpperCase()} | ${fD(v('dat'))} ${v('hor')}`, 20, i.height - 40);
            imgB64 = cv.toDataURL('image/jpeg', 0.8);
            $('fPrv').src = imgB64; $('fPrv').style.display = 'block';
        }; i.src = ev.target.result;
    }; r.readAsDataURL(f);
};

let dAt=new Date();
const rCal=()=>{let y=dAt.getFullYear(),m=dAt.getMonth(),fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),td=new Date().toISOString().split('T')[0],sd=v('bDat'),h='DOM SEG TER QUA QUI SEX SAB'.split(' ').map(d=>`<div class="cDh">${d}</div>`).join('');let mx=new Date(y,m,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});$('calM').innerText=`${mx.charAt(0).toUpperCase()+mx.slice(1)}`;for(let i=0;i<fd;i++)h+=`<div></div>`;for(let i=1;i<=dm;i++){let dt=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`,ev=dbO.filter(o=>o.dat===dt),eH=ev.map(o=>`<div class="cE ${o.sts=="Concluído"?"co":(o.sts=="Em Andamento"?"an":"ag")}"><i class="ph ph-clock"></i> ${o.hor} - ${o.cli.split(' ')[0]}</div>`).join('');h+=`<div class="cD ${dt===td?'td':''} ${dt===sd?'sl':''}" onclick="$('bDat').value='${dt}';rL();rCal()"><div class="cDn">${i}</div>${eH}</div>`}$('cGrid').innerHTML=h};
const cMes=d=>{dAt.setMonth(dAt.getMonth()+d);rCal()};
$('bTxt').oninput=()=>rL();const lFlt=()=>{$('bTxt').value=$('bDat').value='';rL();rCal()};

const rFin=()=>{let m=v('fMes'),f=dbO.filter(o=>m?o.dat.startsWith(m):!0),rc=0,pn=0;f.map(o=>o.pag?rc+=o.val:pn+=o.val);$('tRec').innerText=fM(rc);$('tPen').innerText=fM(pn);$('tTot').innerText=fM(rc+pn);let l=$('lFin');l.innerHTML=f.length?'':'<div style="text-align:center;padding:40px;color:#aaa">Sem dados</div>';f.sort((a,b)=>b.dat.localeCompare(a.dat)).map(o=>{l.innerHTML+=`<div class="osi" style="--stc:${o.pag?'#2ecc71':'#f39c12'}"><div class="oi"><h4><i class="ph ph-hash"></i>${o.id.toString().slice(-6)} - ${o.cli}</h4><p><i class="ph ph-calendar-blank"></i> ${fD(o.dat)} | ${o.sts}</p></div><div class="osa"><span class="osv">${fM(o.val)}</span><button class="btn bo" style="padding:6px 12px;color:${o.pag?'#2ecc71':'#f39c12'};border-color:${o.pag?'#2ecc71':'#f39c12'}" onclick="tPag(${o.id})">${o.pag?'<i class="ph ph-check-circle"></i> PAGO':'<i class="ph ph-clock"></i> PENDENTE'}</button></div></div>`})};
const tPag=id=>{let o=dbO.find(x=>x.id==id);o.pag=o.pag?0:1;ls.setItem('dbO',s(dbO));rFin();rL()};

const aDl=()=>{$('lCli').innerHTML='';dbC.sort((a,b)=>a.nome.localeCompare(b.nome)).map(c=>$('lCli').innerHTML+=`<option value="${c.nome}">`)};
const rCli=()=>{let l=$('lCliRnd'),tx=v('bCliTxt').toLowerCase(),f=dbC.filter(c=>c.nome.toLowerCase().includes(tx)||c.tel?.includes(tx)||c.doc?.includes(tx)||c.ema?.toLowerCase().includes(tx));l.innerHTML=f.length?'':'<div style="text-align:center;padding:40px;color:#aaa">Vazio</div>';f.map(c=>l.innerHTML+=`<div class="osi" style="padding:20px;flex-direction:column;align-items:flex-start"><div style="width:100%;display:flex;justify-content:space-between"><div class="oi"><h4 style="margin:0"><i class="ph ph-buildings"></i> ${c.nome}</h4>${c.doc?`<span style="font-size:12px;color:var(--m);display:block;margin-top:4px"><i class="ph ph-identification-card"></i> ${c.doc}</span>`:''}</div><div class="ig"><button class="btn bo" style="padding:6px 12px" onclick="edCli(${c.id})"><i class="ph ph-pencil"></i></button><button class="btn bo" style="padding:6px 12px;color:#e74c3c" onclick="exCli(${c.id})"><i class="ph ph-trash"></i></button></div></div><div style="display:flex;gap:15px;flex-wrap:wrap;margin-top:12px;width:100%;background:var(--bg);padding:12px;border-radius:8px">${c.tel?`<span style="font-size:12px;display:flex;gap:5px"><i class="ph ph-phone"></i> ${c.tel}</span>`:''}${c.ema?`<span style="font-size:12px;display:flex;gap:5px"><i class="ph ph-envelope"></i> ${c.ema}</span>`:''}${c.res?`<span style="font-size:12px;display:flex;gap:5px"><i class="ph ph-user"></i> ${c.res}</span>`:''}${c.end?`<span style="font-size:12px;width:100%;display:flex;gap:5px"><i class="ph ph-map-pin"></i> ${c.end}</span>`:''}</div></div>`)};
$('fCli').onsubmit=e=>{e.preventDefault();let id=v('cId'),o={nome:v('cNom').trim(),tel:v('cTel').trim(),doc:v('cDoc').trim(),ema:v('cEma').trim(),res:v('cRes').trim(),end:v('cEnd').trim()};id?dbC[dbC.findIndex(x=>x.id==id)]={...dbC.find(x=>x.id==id),...o}:(o.id=Date.now(),dbC.push(o));cCEd();ls.setItem('dbC',s(dbC));aDl();rCli();tst.fire({icon:'success',title:'Salvo!'})};
const edCli=id=>{let c=dbC.find(x=>x.id==id);['cId','cNom','cDoc','cTel','cEma','cRes','cEnd'].map(k=>$(k).value=c[k.replace('c','').toLowerCase()]||(k=='cId'?id:''));$('bCSal').innerHTML="Atualizar";$('bCCan').style.display="block";window.scrollTo(0,0)};
const cCEd=()=>{$('fCli').reset();$('cId').value="";$('bCSal').innerHTML="<i class='ph ph-plus'></i> Salvar";$('bCCan').style.display="none"};
const exCli=id=>Swal.fire({title:'Excluir?',icon:'warning',showCancelButton:!0,confirmButtonColor:'#d33'}).then(r=>{if(r.isConfirmed)dbC=dbC.filter(c=>c.id!==id),ls.setItem('dbC',s(dbC)),rCli(),aDl()});
$('bCliTxt').oninput=rCli;
const rC=()=>{let h='<option value="">-- Selecione --</option>';$('rCat').innerHTML='';dbCat.map(i=>{h+=`<option value="${i.id}">${i.nome} - ${fM(i.valor)}</option>`;$('rCat').innerHTML+=`<div class="cat"><span><i class="ph ph-check-circle" style="color:var(--p)"></i> ${i.nome} (${fM(i.valor)})</span><button class="btn bo" style="padding:6px 12px" onclick="rmC(${i.id})"><i class="ph ph-trash" style="color:#e74c3c"></i></button></div>`});$('sCat').innerHTML=h};
const aCat=()=>{let i=dbCat.find(x=>x.id==v('sCat'));if(i)$('dsc').value+=(v('dsc')?"\n":"")+"- "+i.nome,$('val').value=(parseFloat(v('val'))||0)+i.valor,$('sCat').value="",tst.fire({icon:'success',title:'Add!'})};
$('fCat').onsubmit=e=>{e.preventDefault();dbCat.push({id:Date.now(),nome:v('nCat'),valor:parseFloat(v('vCat'))});ls.setItem('dbCat',s(dbCat));e.target.reset();rC();tst.fire({icon:'success',title:'Salvo'})};
const rmC=id=>{dbCat=dbCat.filter(i=>i.id!==id);ls.setItem('dbCat',s(dbCat));rC()};
const rCatP=()=>Swal.fire({title:'Restaurar?',icon:'warning',showCancelButton:!0}).then(r=>{if(r.isConfirmed)dbCat=[...cP],ls.setItem('dbCat',s(dbCat)),rC()});
const aF=()=>{let c=dbC.find(x=>x.nome===v('cli').trim());if(c&&c.end){$('end').value=c.end;bGPS()}};
const bGPS=async()=>{let e=v('end');if(!e)return;$('gps').value='Buscando...';try{let r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(e)),d=await r.json();if(d.length){$('gps').value=d[0].lat+','+d[0].lon;tst.fire({icon:'success',title:'GPS Encontrado!'})}else{$('gps').value='';tst.fire({icon:'error',title:'Endereço não localizado'})}}catch(x){$('gps').value=''}};
const cGPS=()=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>{$('gps').value=`${p.coords.latitude},${p.coords.longitude}`;tst.fire({icon:'success',title:'GPS OK'})},e=>Swal.fire('Erro','GPS Negado','error')):Swal.fire('Erro','S/ GPS','info');
const oMap=()=>{v('gps')?window.open('https://maps.google.com/?q='+v('gps').replace(/ /g,''),'_blank'):tst.fire({icon:'error',title:'Preencha o GPS primeiro!'})};
const gPOS=()=>{let t=`*⚙️ PRÉ-O.S*\n*🏢 Cliente:* ${v('cli')}\n*🚚 Veículo:* ${v('vei')}\n*📅 Data:* ${fD(v('dat'))} às ${v('hor')}\n*📍 Endereço:* ${v('end')}\n*🗺️ GPS:* ${v('gps')}\n*🔗 Mapa:* ${v('gps')?'https://maps.google.com/?q='+v('gps').replace(/ /g,''):'Não informado'}\n*🔧 Serviços:* ${v('dsc')}`;navigator.clipboard.writeText(t).then(()=>Swal.fire('Copiado!','Cole no WhatsApp','success')).catch(()=>Swal.fire('Copie:',t,'info'))};

const sNuv=async()=>{
    if(!navigator.onLine) return Swal.fire('Offline','Sem internet. Conecte-se e tente novamente.','warning');
    let pd=dbO.filter(o=>!o.sync);
    if(!pd.length) return tst.fire({icon:'info',title:'Tudo já está sincronizado!'});
    Swal.fire({title:'Sincronizando...',text:`Enviando ${pd.length} O.S`,allowOutsideClick:!1,didOpen:()=>Swal.showLoading()});
    let sc=0;
    for(let o of pd){
        try{
            if(o.b64 && !o.fotoUrl){
                let fd=new FormData();fd.append('file',o.b64);fd.append('upload_preset',UP_PRESET);
                let r=await fetch(CLOUD_URL,{method:'POST',body:fd});let res=await r.json();o.fotoUrl=res.secure_url;delete o.b64;
            }
            let sd={...o};delete sd.b64;await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:s(sd)});
            o.sync=1;sc++;
        }catch(e){}
    }
    ls.setItem('dbO',s(dbO));rL();rCal();rFin();
    Swal.fire('Concluído',`${sc} de ${pd.length} enviadas!`,sc==pd.length?'success':'warning');
};

$('fOs').onsubmit=async e=>{
    e.preventDefault();
    try {
        Swal.fire({title:'Processando...',allowOutsideClick:!1,didOpen:()=>Swal.showLoading()});
        let n=v('cli').trim(), id=v('eId'), fU=$('fPrv').dataset.url||'', on=navigator.onLine;
        let oId = id ? parseInt(id) : Date.now();
        let o={id:oId, cli:n, vei:v('vei').toUpperCase(), dat:v('dat'), hor:v('hor'), end:v('end'), gps:v('gps'), dsc:v('dsc'), sts:v('sts'), pag:parseInt(v('pag')), val:parseFloat(v('val')), fotoUrl:fU, sync:0};
        
        if(imgB64&&!fU){
            if(on){
                let fd=new FormData();fd.append('file',imgB64);fd.append('upload_preset',UP_PRESET);
                try{let r=await fetch(CLOUD_URL,{method:'POST',body:fd});let res=await r.json();o.fotoUrl=res.secure_url}catch(err){o.b64=imgB64}
            }else o.b64=imgB64
        }
        
        if(n&&!dbC.find(c=>c.nome===n)){dbC.push({id:Date.now(),nome:n,tel:'',doc:'',ema:'',res:'',end:v('end')});ls.setItem('dbC',s(dbC));aDl();rCli()}
        
        if(id) {
            let idx = dbO.findIndex(x => x.id == id);
            if(idx !== -1) dbO[idx] = {...dbO[idx], ...o};
            else dbO.push(o);
        } else {
            dbO.push(o);
        }
        
        if(on && GAS_URL.includes('/exec')){
            try{let sd={...o};delete sd.b64;await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:s(sd)});let sObj=dbO.find(x=>x.id==oId);if(sObj)sObj.sync=1}catch(x){console.log(x)}
        }
        
        let isSync=dbO.find(x=>x.id==oId)?.sync||0;
        cEd();ls.setItem('dbO',s(dbO));rL();rCal();rFin();imgB64='';$('fPrv').style.display='none';$('fPrv').dataset.url='';
        Swal.fire({icon:'success',title:isSync?'Salvo na Nuvem!':'Salvo Offline (Pendente)',confirmButtonColor:'#1976d2'});
    } catch (err) {
        Swal.fire('Erro Inesperado', 'Ocorreu um problema ao salvar: ' + err.message, 'error');
    }
};

const edO=id=>{let o=dbO.find(x=>x.id==id);['eId','cli','vei','dat','hor','end','gps','dsc','sts','pag','val'].map(k=>$(k).value=o[k]||(k=='pag'?0:(k=='eId'?id:'')));$('fTit').innerHTML=`<i class="ph ph-pencil"></i> O.S #${id.toString().slice(-6)}`;$('bSal').innerHTML=`<i class="ph ph-floppy-disk"></i> ATUALIZAR`;$('bCan').style.display="block";if(o.fotoUrl||o.b64){let u=o.fotoUrl||o.b64;$('fPrv').src=u;$('fPrv').style.display='block';$('fPrv').dataset.url=o.fotoUrl||'';imgB64=o.b64||''}else{$('fPrv').style.display='none';$('fPrv').dataset.url='';imgB64=''}sv('v-os',$$('.ni')[0]);window.scrollTo(0,0)};
const cEd=()=>{let d=new Date();$('fOs').reset();$('eId').value="";$('fTit').innerHTML="Nova O.S";$('bSal').innerHTML=`<i class="ph ph-floppy-disk"></i> SALVAR O.S`;$('bCan').style.display="none";$('dat').value=d.toISOString().split('T')[0];$('hor').value=d.toTimeString().slice(0,5);$('sts').value="Agendado";$('pag').value="0";$('fPrv').style.display='none';$('fPrv').dataset.url='';imgB64=''};
const exO=id=>Swal.fire({title:'Excluir?',icon:'warning',showCancelButton:!0,confirmButtonColor:'#d33'}).then(r=>{if(r.isConfirmed)dbO=dbO.filter(o=>o.id!==id),ls.setItem('dbO',s(dbO)),rL(),rCal(),rFin()});
const rL=()=>{let l=$('lOs'),tx=v('bTxt').toLowerCase(),dt=v('bDat'),t=0,f=dbO.filter(o=>(o.cli.toLowerCase().includes(tx)||o.id.toString().includes(tx))&&(dt?o.dat===dt:!0));l.innerHTML=f.length?'':'<div style="text-align:center;padding:40px;color:#aaa">Nenhuma O.S.</div>';f.sort((a,b)=>b.id-a.id).map(o=>{t+=o.val;let s=o.sts,bC=s=="Concluído"?"con":(s=="Em Andamento"?"and":"");l.innerHTML+=`<div class="osi" style="--stc:${s=="Concluído"?"#2ecc71":(s=="Em Andamento"?"#f39c12":"var(--b)")}"><div class="oi"><h4>${o.sync?'<i class="ph ph-cloud-check" style="color:#2ecc71" title="Sincronizado"></i>':'<i class="ph ph-cloud-slash" style="color:#e74c3c" title="Pendente"></i>'} #${o.id.toString().slice(-6)} - ${o.cli}</h4><p><i class="ph ph-truck"></i> ${o.vei} | <i class="ph ph-calendar-blank"></i> ${fD(o.dat)} às ${o.hor}</p><p><i class="ph ph-wrench"></i> ${o.dsc.substring(0,40)}...</p><span class="bdg ${bC}">${s}</span>${o.fotoUrl||o.b64?` <a href="${o.fotoUrl||o.b64}" target="_blank" style="font-size:11px;color:var(--p);font-weight:bold;text-decoration:none"><i class="ph ph-image"></i> Foto</a>`:''}</div><div class="osa"><span class="osv">${fM(o.val)}</span><div class="ig"><button class="btn bo" style="padding:6px 12px" onclick="edO(${o.id})"><i class="ph ph-pencil"></i></button><button class="btn bo" style="padding:6px 12px;color:#e74c3c" onclick="exO(${o.id})"><i class="ph ph-trash"></i></button></div></div></div>`});$('tFat').innerText=`Fat: ${fM(t)}`};
</script></body></html>
